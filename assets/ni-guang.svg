<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Ni Guang chibi mage portrait</title>
  <desc id="desc">An original chibi blonde staff girl with bright mage styling.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="64%">
      <stop offset="0" stop-color="#fff8be"/>
      <stop offset="0.56" stop-color="#63d8ff"/>
      <stop offset="1" stop-color="#264a8f"/>
    </radialGradient>
    <linearGradient id="hair" x1="126" y1="104" x2="360" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff6a9"/>
      <stop offset="0.45" stop-color="#ffd94c"/>
      <stop offset="1" stop-color="#d9891d"/>
    </linearGradient>
    <linearGradient id="robe" x1="190" y1="286" x2="335" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.52" stop-color="#66d9ff"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Ya Suo chibi swordsman portrait</title>
  <desc id="desc">An original chibi black-haired wanderer in blue clothing holding a katana.</desc>
  <defs>
    <radialGradient id="bg" cx="48%" cy="38%" r="68%">
      <stop offset="0" stop-color="#b9f4ff"/>
      <stop offset="0.54" stop-color="#2b8ec4"/>
      <stop offset="1" stop-color="#13284c"/>
    </radialGradient>
    <linearGradient id="hair" x1="178" y1="90" x2="343" y2="247" gradientUnits="userSpaceOnUse">
